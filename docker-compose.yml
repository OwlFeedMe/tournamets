services:
  redis:
    image: redis:7-alpine
    container_name: loyalty_tournament_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-devredis}
    volumes:
      - loyalty_tournament_redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-devredis}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  server:
    build:
      context: ./server
    container_name: loyalty_tournament_server
    working_dir: /app
    command: sh -c "uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:T2oY_96cHZcfVHvhvHAn@host.docker.internal:5432/loyalty_race
      CORS_ALLOWED_ORIGINS: http://localhost:5174,http://localhost:3000
      LEADERBOARD_BASE_URL: http://localhost:5174/
      REDIS_URL: redis://:${REDIS_PASSWORD:-devredis}@redis:6379/0
    volumes:
      - ./server:/app
    ports:
      - "8001:8000"
    depends_on:
      redis:
        condition: service_healthy

  client:
    build:
      context: ./client
    container_name: loyalty_tournament_client
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_PROXY_TARGET: http://server:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./client:/app
      - loyalty_tournament_client_node_modules:/app/node_modules
    ports:
      - "5174:5173"
    depends_on:
      - server

volumes:
  loyalty_tournament_client_node_modules:
  loyalty_tournament_redis_data:
