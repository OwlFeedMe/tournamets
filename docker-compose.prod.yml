services:
  redis:
    image: redis:7-alpine
    container_name: loyalty-tournament-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./server
    container_name: loyalty-tournament-backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CACHE_ENABLED: ${CACHE_ENABLED:-1}
      REDIS_MAX_CONNECTIONS: ${REDIS_MAX_CONNECTIONS:-100}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-3}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-10}
      LEADERBOARD_RESULTS_SNAPSHOT_TTL_SECONDS: ${LEADERBOARD_RESULTS_SNAPSHOT_TTL_SECONDS:-900}
    command:
      - /bin/sh
      - -lc
      - >
        uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --workers ${BACKEND_WORKERS:-2}
    volumes:
      - ./server/uploads:/app/uploads
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: loyalty-tournament-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8081}:80"

volumes:
  redis_data:
