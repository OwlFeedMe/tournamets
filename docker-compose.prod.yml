services:
  backend:
    build:
      context: ./server
    container_name: loyalty-tournament-backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./server/uploads:/app/uploads
    expose:
      - "8000"

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: loyalty-tournament-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8081}:80"
